# Gear Cable GitLab CI template for Rumble iOS App Store publication.
# Include from product repositories and set ASC_CLI_BIN plus ASC_CMD_* mappings
# according to the pinned rorkai/App-Store-Connect-CLI version.
#
# GEAR_CABLE_DIR must point to a checked-out or vendored gear-cable tree.

.appstore_connect_base:
  stage: release
  variables:
    ASC_RELEASE_CONFIG: "appstore/release.config.json"
    ASC_DRY_RUN: "0"
    GEAR_CABLE_DIR: "gear-cable"
  before_script:
    - test -x "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh"
    - "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh" validate
  rules:
    - if: '$CI_COMMIT_TAG =~ /^ios-v\d+\.\d+\.\d+$/ || $CI_COMMIT_BRANCH =~ /^release\/ios\//'
      when: manual
    - when: never

release:ios:testflight:
  extends: .appstore_connect_base
  needs:
    - job: build:ios
      artifacts: true
      optional: true
  script:
    - "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh" upload-build --ipa "${IPA_PATH:-}"
    - "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh" upload-metadata

release:ios:submit:
  extends: .appstore_connect_base
  script:
    - "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh" submit-review
  environment:
    name: app-store-production

appstore-cli:compatibility-check:
  stage: release
  variables:
    ASC_DRY_RUN: "1"
  script:
    - "$GEAR_CABLE_DIR/channels/appstore-connect/appstore-release.sh" compat
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - when: manual
  allow_failure: true
