name: contracts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  release-plan-contracts:
    name: Release manifest and plan contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Manifest schema is valid JSON
        run: python3 -m json.tool schemas/gear-cable.manifest.schema.json >/dev/null
      - name: Example release plan is accepted
        run: cargo run -q -p gear-cable-cli -- plan --manifest examples/cos-matic/gear-cable.toml
